name: AI Role Digest

on:
  schedule:
    # GitHub cron runs in UTC. Trigger at both possible UTC hours and gate below
    # so the digest runs at 8:00 AM America/New_York across DST changes.
    - cron: "0 12,13 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check local send time
        id: local_time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=America/New_York date +%H)" = "08" ]; then
            echo "run_digest=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_digest=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.local_time.outputs.run_digest == 'true'

      - uses: actions/setup-python@v6
        if: steps.local_time.outputs.run_digest == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-role-digest/requirements.txt

      - name: Install dependencies
        if: steps.local_time.outputs.run_digest == 'true'
        run: pip install -r ai-role-digest/requirements.txt

      - name: Run digest
        if: steps.local_time.outputs.run_digest == 'true'
        working-directory: ai-role-digest
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m src.digest.main
