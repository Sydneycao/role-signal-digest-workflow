name: AI Role Digest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        working-directory: ai-role-digest
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCORING_MODE: anthropic
          LLM_MAX_POSTS_PER_RUN: "5"
          ANTHROPIC_MAX_TOKENS: "256"
          LLM_POST_CHAR_LIMIT: "3000"
          OUTREACH_MODE: template
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APIFY_MAX_RESULTS_PER_QUERY: ${{ vars.APIFY_MAX_RESULTS_PER_QUERY }}
          APIFY_MAX_QUERIES_PER_RUN: ${{ vars.APIFY_MAX_QUERIES_PER_RUN }}
          APIFY_MAX_TOTAL_RESULTS_PER_RUN: ${{ vars.APIFY_MAX_TOTAL_RESULTS_PER_RUN }}
          APIFY_MAX_PAID_DATASET_ITEMS: ${{ vars.APIFY_MAX_PAID_DATASET_ITEMS }}
          APIFY_DAYS_LOOKBACK: ${{ vars.APIFY_DAYS_LOOKBACK }}
          APIFY_DRY_RUN: ${{ vars.APIFY_DRY_RUN }}
          APIFY_ACTOR_ID: ${{ vars.APIFY_ACTOR_ID }}
          APIFY_MAX_RESULTS_INPUT_FIELD: ${{ vars.APIFY_MAX_RESULTS_INPUT_FIELD }}
          APIFY_POSTED_LIMIT: ${{ vars.APIFY_POSTED_LIMIT }}
          FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
          FEEDBACK_FORM_URL: ${{ secrets.FEEDBACK_FORM_URL }}
        run: python -m src.digest.main
