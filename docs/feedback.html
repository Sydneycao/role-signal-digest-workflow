<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Role Feedback</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:640px;margin:40px auto;padding:0 16px;color:#222}
  h1{font-size:1.35rem;margin:0 0 8px}
  .muted{color:#666;font-size:.95rem;margin:0 0 20px}
  label{display:block;font-weight:650;margin-bottom:8px}
  textarea{box-sizing:border-box;width:100%;min-height:180px;margin:0 0 14px;padding:10px;
           font:inherit;border:1px solid #d0d7de;border-radius:6px}
  button{background:#1a73e8;color:#fff;border:0;border-radius:6px;padding:9px 14px;font:inherit}
  button:disabled{background:#8ab4f8}
  .post-link{color:#1a73e8;margin-left:12px;text-decoration:none}
  .hidden{display:none}
  .status{margin-top:14px;font-size:.95rem}
  .error{color:#b3261e}
</style>
</head>
<body>
<h1 id="heading">Add feedback</h1>
<p class="muted" id="title">LinkedIn role</p>
<form id="feedback-form">
  <div id="note-fields">
    <label for="note">Why is this result not good?</label>
    <textarea id="note" name="note" required autofocus></textarea>
  </div>
  <button type="submit" id="submit-button">Save feedback</button>
  <a class="post-link hidden" id="post-link">View post</a>
  <p class="status" id="status"></p>
</form>
<script>
  const params = new URLSearchParams(window.location.search);
  const title = params.get("title") || "LinkedIn role";
  const apiUrl = params.get("api_url");
  const postId = params.get("post_id") || "";
  const postUrl = params.get("post_url") || "";
  const feedbackType = params.get("feedback_type") === "good" ? "good" : "not_good";
  const form = document.getElementById("feedback-form");
  const status = document.getElementById("status");
  const button = document.getElementById("submit-button");
  const note = document.getElementById("note");
  const noteFields = document.getElementById("note-fields");
  const postLink = document.getElementById("post-link");

  document.getElementById("title").textContent = title;
  if (feedbackType === "good") {
    document.title = "Confirm good fit";
    document.getElementById("heading").textContent = "Confirm good fit";
    noteFields.classList.add("hidden");
    note.required = false;
    button.textContent = "Save as Good";
    if (postUrl) {
      postLink.href = postUrl;
      postLink.classList.remove("hidden");
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    status.className = "status";
    status.textContent = "";

    if (!apiUrl || !postId) {
      status.className = "status error";
      status.textContent = "This feedback link is missing required details.";
      return;
    }

    button.disabled = true;
    button.textContent = "Saving...";

    try {
      const response = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          post_id: postId,
          post_url: postUrl,
          title,
          feedback_type: feedbackType,
          note: note.value,
        }),
      });
      const result = await response.json();
      if (!response.ok || !result.ok) {
        throw new Error(result.error || "Could not save feedback.");
      }
      status.textContent = feedbackType === "good"
        ? "Saved as Good. Thank you."
        : "Feedback saved. Thank you.";
      form.reset();
    } catch (error) {
      status.className = "status error";
      status.textContent = error.message;
    } finally {
      button.disabled = false;
      button.textContent = feedbackType === "good" ? "Save as Good" : "Save feedback";
    }
  });
</script>
</body>
</html>
